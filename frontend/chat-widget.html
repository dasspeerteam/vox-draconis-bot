<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Draconis - WoW Hilfe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Chat Container */
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: #16213e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #0f3460;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #d4af37 0%, #1a1a2e 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
        }

        .chat-header h1 {
            color: #fff;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .chat-header p {
            color: #d4af37;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #1a1a2e;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #0f3460;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        /* Message Bubbles */
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #d4af37;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #0f3460;
            color: #fff;
            border: 1px solid #1a4a7a;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }

        /* Typing Indicator */
        .typing {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: #0f3460;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #d4af37;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #0f3460;
            border-radius: 25px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #d4af37;
        }

        .chat-input::placeholder {
            color: #666;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #d4af37;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #f4d03f;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* Welcome Message */
        .welcome {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .welcome-icon {
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }
        
        .welcome-icon svg {
            display: block;
            margin: 0 auto;
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }

        .quick-btn {
            padding: 8px 16px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 20px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: #d4af37;
            border-color: #e94560;
        }

        /* Error Message */
        .error-message {
            background: #ff4444 !important;
            color: #fff !important;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Vox Draconis</h1>
            <p>Dein WoW Experte</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome">
                <div class="welcome-icon">
                    <img src="vd-kopf.png" alt="Vox Draconis Logo" width="120" height="120">
                </div>
                <p>Die Stimme des Drachen erwacht...</p>
                <p style="font-size: 0.85rem; margin-top: 10px;">
                    Ich bin Vox Draconis, weiser Berater der Gilde. Frag mich zu Klassen, Talenten, Dungeons, Berufen oder den Mächten eurer Gildenmitglieder.
                </p>
                <div class="quick-questions">
                    <button class="quick-btn" onclick="sendQuick('Wer sind die Top 5 nach GS?')">🏆 Top GS</button>
                    <button class="quick-btn" onclick="sendQuick('Wie besiegt man Sikran?')">🐉 Boss-Taktik</button>
                    <button class="quick-btn" onclick="sendQuick('Wer ist in der Gilde?')">👥 Mitglieder</button>
                    <button class="quick-btn" onclick="sendQuick('Zeig mir den letzten Raid')">📅 Raid-Logs</button>
                </div>
            </div>
        </div>

        <div class="typing" id="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Stelle deine WoW-Frage..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // API URL zum Backend
        const API_URL = 'https://vox-draconis-bot.vercel.app/chat';

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');

        function getTime() {
            return new Date().toLocaleTimeString('de-DE', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function addMessage(text, isUser = false, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = `message-content ${isError ? 'error-message' : ''}`;
            contentDiv.textContent = text;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = getTime();
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            typing.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            typing.classList.remove('active');
        }

        async function sendMessage() {
            showGreeting();
            const message = chatInput.value.trim();
            if (!message) return;

            // User-Nachricht anzeigen
            addMessage(message, true);
            chatInput.value = '';
            
            // UI sperren
            chatInput.disabled = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                hideTyping();
                
                if (data.success) {
                    addMessage(data.reply, false);
                } else {
                    addMessage('Entschuldigung, ich konnte nicht antworten. Bitte versuche es erneut.', false, true);
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                addMessage('Fehler: Verbindung zum Server fehlgeschlagen. Ist das Backend online?', false, true);
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        function sendQuick(text) {
            showGreeting();
            chatInput.value = text;
            sendMessage();
        }

        // Enter-Taste im Inputfeld
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Begrüßung kommt erst nach Klick auf einen Button oder Eingabe
        let greetingShown = false;
        
        function showGreeting() {
            if (!greetingShown) {
                greetingShown = true;
                const welcomeDiv = document.querySelector('.welcome');
                if (welcomeDiv) {
                    welcomeDiv.style.display = 'none';
                }
                addMessage("Grüße. Ich bin die Stimme des Drachen, Vox Draconis.\nMein Wissen reicht zurück bis in die frühesten Zeiten Azeroths.\nWie kann ich dir heute helfen?", false);
            }
        }
        
        // Begrüßung bei erster Interaktion
        chatInput.addEventListener('focus', showGreeting);
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', showGreeting);
        });
    </script>
</body>
</html>
